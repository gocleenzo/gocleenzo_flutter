name: cleenzo
description: Cleenzo - Home Care In Minutes
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.0

  # Payment - pinned to 1.3.5, no caret (avoids rzp_logo + namespace bugs in 1.4.x)
  razorpay_flutter: 1.4.5
  http: ^1.2.0

  # Navigation
  go_router: ^13.0.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  shimmer: ^3.0.0

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.0
  pin_code_fields: ^8.0.1

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/services/dusting and wiping.jpg
    - assets/services/fridge-cleaning.jpg
    - assets/services/Houly-Booking.jpg
    - assets/services/kitchen cleaning.jpg
    - assets/services/mopping.jpg
    - assets/services/utensils-cleaning.jpg
    - assets/services/wardrobe-cleaning.jpg
    - assets/services/Bathroom-Cleaning.jpg
    - assets/services/balcony_cleaning.jpg
    - assets/services/after-party.jpg
    - assets/services/fan_cleaning.jpg
    - assets/services/kitchen_cabinet.jpg
    - assets/services/pre-party.jpg